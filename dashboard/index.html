<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OpenWA self-hosted WhatsApp API dashboard for sessions, webhooks, messages, and infrastructure."
    />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #102033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(37, 211, 102, 0.12), transparent 34%),
          linear-gradient(315deg, rgba(20, 184, 166, 0.12), transparent 32%),
          #f6f8fb;
      }

      .html-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .html-shell__panel {
        width: min(100%, 460px);
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        padding: 32px;
      }

      .html-shell__brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }

      .html-shell__brand img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      .html-shell__brand strong {
        display: block;
        font-size: 1.15rem;
        line-height: 1.2;
      }

      .html-shell__brand span,
      .html-shell__text {
        color: #64748b;
      }

      .html-shell__text {
        margin: 0;
        line-height: 1.6;
      }

      .html-shell__bar {
        height: 6px;
        margin-top: 28px;
        overflow: hidden;
        border-radius: 999px;
        background: #e2e8f0;
      }

      .html-shell__bar::before {
        content: "";
        display: block;
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background: #25d366;
        animation: openwa-load 1.2s ease-in-out infinite;
      }

      @keyframes openwa-load {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(300%);
        }
      }
    </style>
    <title>OpenWA</title>
  </head>
  <body>
    <div id="root">
      <main class="html-shell" aria-busy="true">
        <section class="html-shell__panel" aria-label="OpenWA dashboard loading">
          <div class="html-shell__brand">
            <img src="/openwa_logo.webp" alt="OpenWA" />
            <div>
              <strong>OpenWA</strong>
              <span>WhatsApp API Dashboard</span>
            </div>
          </div>
          <p class="html-shell__text">Loading the secure dashboard interface...</p>
          <div class="html-shell__bar" aria-hidden="true"></div>
        </section>
      </main>
    </div>
    <noscript>
      <div class="html-shell">
        <section class="html-shell__panel">
          <div class="html-shell__brand">
            <img src="/openwa_logo.webp" alt="OpenWA" />
            <div>
              <strong>OpenWA</strong>
              <span>WhatsApp API Dashboard</span>
            </div>
          </div>
          <p class="html-shell__text">JavaScript is required to use the dashboard.</p>
        </section>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
