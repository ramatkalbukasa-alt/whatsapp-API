services:
  # Web Service - OpenWA API
  - type: web
    name: openwa-api
    env: docker
    healthCheckPath: /api/health
    region: ohio
    plan: free
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: OPENWA_ADMIN_API_KEY
        sync: false
      - key: DATABASE_TYPE
        value: postgres
      - key: DATABASE_SYNCHRONIZE
        value: 'false'
      - key: ENGINE_TYPE
        value: whatsapp-web.js
      - key: SESSION_DATA_PATH
        value: /app/data/sessions
      - key: PUPPETEER_HEADLESS
        value: 'true'
      - key: PUPPETEER_ARGS
        value: '--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu'
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_PATH
        value: /app/data/media
      - key: CORS_ORIGINS
        value: '*'
      - key: RATE_LIMIT_MAX
        value: '100'
      - key: RATE_LIMIT_WINDOW
        value: '900000'
      - key: DASHBOARD_ENABLED
        value: 'true'
      - key: DASHBOARD_PORT
        value: '3000'
      - key: WEBHOOK_RETRIES
        value: '3'
      - key: WEBHOOK_RETRY_DELAY
        value: '5000'
      - key: PLUGINS_ENABLED
        value: 'true'
      - key: PLUGINS_PATH
        value: /app/data/plugins
      - key: DATABASE_HOST
        fromDatabase:
          name: openwa-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: openwa-db
          property: port
      - key: DATABASE_USERNAME
        fromDatabase:
          name: openwa-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: openwa-db
          property: password
      - key: DATABASE_NAME
        fromDatabase:
          name: openwa-db
          property: database

databases:
  # PostgreSQL Database (free tier - 1GB, 90 days)
  - name: openwa-db
    plan: free
    region: ohio
    databaseName: openwa
    user: openwa
