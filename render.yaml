services:
  # Web Service - OpenWA API
  - type: web
    name: openwa-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    region: ohio
    plan: standard
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 2785
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_TYPE
        value: postgres
      - key: DATABASE_SYNCHRONIZE
        value: 'false'
      - key: ENGINE_TYPE
        value: whatsapp-web.js
      - key: SESSION_DATA_PATH
        value: /app/data/sessions
      - key: PUPPETEER_HEADLESS
        value: 'true'
      - key: PUPPETEER_ARGS
        value: '--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu'
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_PATH
        value: /app/data/media
      - key: CORS_ORIGINS
        value: '*'
      - key: RATE_LIMIT_MAX
        value: '100'
      - key: RATE_LIMIT_WINDOW
        value: '900000'
      - key: DASHBOARD_ENABLED
        value: 'true'
      - key: DASHBOARD_PORT
        value: '3000'
      - key: WEBHOOK_RETRIES
        value: '3'
      - key: WEBHOOK_RETRY_DELAY
        value: '5000'
      - key: PLUGINS_ENABLED
        value: 'true'
      - key: PLUGINS_PATH
        value: /app/data/plugins
      - key: DATABASE_HOST
        fromDatabase:
          name: openwa-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: openwa-db
          property: port
      - key: DATABASE_USERNAME
        fromDatabase:
          name: openwa-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: openwa-db
          property: password
      - key: DATABASE_NAME
        fromDatabase:
          name: openwa-db
          property: databaseName
      - key: REDIS_HOST
        fromService:
          type: redis
          name: openwa-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: openwa-redis
          property: port

  # Redis Cache
  - type: redis
    name: openwa-redis
    plan: standard
    region: ohio

databases:
  # PostgreSQL Database
  - name: openwa-db
    plan: standard
    region: ohio
    databaseName: openwa
    user: openwa
